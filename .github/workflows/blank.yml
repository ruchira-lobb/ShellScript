name: ShellScript CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ========================
  # 1. BUILD / CHECK SCRIPT
  # ========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -R

      - name: Check shell script syntax
        run: bash -n test/test.sh


  # ========================
  # 2. RUN TESTS
  # ========================
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x test/test.sh

      - name: Run script
        run: ./test/test.sh


  # ========================
  # 3. DEPLOY (SIMULATION)
  # ========================
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy step (demo)
        run: echo "Deploying application..."
