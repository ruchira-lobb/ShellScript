name: ShellScript CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout once only
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Show structure
      - name: Show files
        run: ls -R

      # 3. Syntax check (FAST)
      - name: Check shell script syntax
        run: bash -n test/test.sh

      # 4. Run script
      - name: Run tests
        run: |
          chmod +x test/test.sh
          ./test/test.sh

      # 5. Deploy (simulation)
      - name: Deploy step (demo)
        if: github.ref == 'refs/heads/main'
        run: echo "Deploying application..."
